<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYANX ULTIMATE | All-In-One Suite</title>
    
    <script type='text/javascript' src='//pl26073702.highcpmgate.com/8a/91/3a/8a913a4471f654b8883fa848f37fea48.js'></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');
        :root { --blue: #3b82f6; }
        body { font-family: 'Inter', sans-serif; transition: 0.5s; background: #000; color: #fff; overflow-x: hidden; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .v-link.active { color: var(--blue); border-bottom: 2px solid var(--blue); opacity: 1; }
        .v-link { opacity: 0.5; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; }
        .warning-tag { background: #ff4d4d; color: #000; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body id="mainBody" class="theme-black">

    <nav class="p-4 sticky top-0 z-[100] border-b border-white/5 bg-black/80 backdrop-blur-md flex justify-between items-center">
        <div class="font-gaming text-2xl italic text-blue-500">AYANX</div>
        <div class="flex gap-6 items-center">
            <span onclick="switchView('downloader')" class="v-link active">Downloader</span>
            <span onclick="switchView('v2link')" class="v-link">V2Link</span>
            <span onclick="switchView('pdf')" class="v-link">PDF-Lab</span>
            <button onclick="toggleSettings()" class="text-blue-500"><i class="fas fa-sliders-h"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[2.5rem] max-w-sm w-full border border-blue-500/30 text-center">
            <h2 class="font-gaming text-blue-500 mb-6 italic">SYSTEM CORE</h2>
            <div class="grid grid-cols-3 gap-2 mb-8">
                <button onclick="applyTheme('black')" class="bg-black border border-white/10 py-3 rounded-xl text-[8px] font-bold">BLACK</button>
                <button onclick="applyTheme('white')" class="bg-white text-black py-3 rounded-xl text-[8px] font-bold">WHITE</button>
                <button onclick="applyTheme('grey')" class="bg-gray-700 py-3 rounded-xl text-[8px] font-bold">GREY</button>
            </div>
            <button onclick="toggleSettings()" class="w-full bg-blue-600 py-4 rounded-xl font-gaming text-xs">EXIT SETTINGS</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3 glass px-4 py-2 rounded-full border-red-500/20">
                <span class="warning-tag">WARNING</span>
                <p class="text-[9px] font-bold tracking-widest opacity-60">ENCRYPTION BYPASS ACTIVE : PROXY 127.0.0.1</p>
            </div>
        </div>

        <section id="downloaderView" class="view">
            <div class="text-center mb-12">
                <h1 class="font-gaming text-7xl font-black gradient-text italic">ULTIMATE</h1>
                <p class="text-[9px] uppercase tracking-[0.5em] opacity-40 mt-2 font-bold">Advanced Extraction Engine</p>
            </div>
            <div class="glass p-3 rounded-[3rem] flex flex-col md:flex-row gap-3 mb-12 border-blue-500/10">
                <input type="url" id="mediaUrl" placeholder="PASTE YOUTUBE OR SOCIAL LINK..." class="flex-1 bg-transparent px-8 py-5 outline-none font-bold text-lg">
                <button onclick="processLink()" class="bg-blue-600 px-12 py-5 rounded-[2.5rem] font-gaming font-black hover:bg-white hover:text-black transition-all">FETCH</button>
            </div>
            
            <div id="loader" class="hidden text-center mb-10">
                <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-gaming text-[8px] text-blue-500 animate-pulse">Establishing Tunnel...</p>
            </div>

            <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="v2linkView" class="view hidden">
            <div class="glass p-16 rounded-[3rem] text-center border-dashed border-white/10">
                <i class="fas fa-satellite-dish text-5xl text-blue-500 mb-6"></i>
                <h3 class="font-gaming text-sm mb-8">VIDEO TO DIRECT LINK CLOUD</h3>
                <input type="file" id="v2lInput" class="hidden">
                <label for="v2lInput" class="bg-white text-black px-12 py-5 rounded-2xl font-gaming text-[10px] cursor-pointer inline-block hover:scale-105 transition-all">UPLOAD FILE</label>
                <div id="v2lOutput" class="mt-10 font-bold text-blue-400"></div>
            </div>
        </section>

        <section id="pdfView" class="view hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-12 rounded-[3rem] text-center group hover:border-blue-500 transition-all">
                    <i class="fas fa-file-pdf text-4xl text-blue-500 mb-4"></i>
                    <h4 class="font-gaming text-[10px] mb-6">IMG TO PDF CONVERTER</h4>
                    <input type="file" id="pdfInput" multiple accept="image/*" class="hidden">
                    <label for="pdfInput" class="bg-blue-600 px-8 py-3 rounded-xl font-bold text-[9px] cursor-pointer">SELECT IMAGES</label>
                </div>
                <div class="glass p-12 rounded-[3rem] text-center group hover:border-red-500 transition-all">
                    <i class="fas fa-shield-alt text-4xl text-red-500 mb-4"></i>
                    <h4 class="font-gaming text-[10px] mb-6">PDF SECURITY LAYER</h4>
                    <input type="file" id="pdfSec" accept="application/pdf" class="hidden">
                    <label for="pdfSec" class="bg-red-600 px-8 py-3 rounded-xl font-bold text-[9px] cursor-pointer">ENCRYPT PDF</label>
                </div>
            </div>
        </section>

    </main>

    <script>
        const FLASK_API = "http://127.0.0.1:5000";
        const RAPID_API = "https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink";
        const RAPID_KEY = "29f8c3b79amshc7b9755d426320dp1b94fajsn62b1821d47db";

        // UI SWITCHER
        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.v-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id + 'View').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function applyTheme(t) {
            const body = document.getElementById('mainBody');
            body.className = 'theme-' + t;
            if(t === 'white') { body.style.background = "#fff"; body.style.color = "#000"; }
            else if(t === 'grey') { body.style.background = "#1a1a1b"; body.style.color = "#fff"; }
            else { body.style.background = "#000"; body.style.color = "#fff"; }
        }

        // DOWNLOADER LOGIC
        async function processLink() {
            const url = document.getElementById('mediaUrl').value;
            if(!url) return;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            if(url.includes('youtube.com') || url.includes('youtu.be')) {
                fetchYouTube(url);
            } else {
                fetchSocial(url);
            }
        }

        async function fetchYouTube(url) {
            try {
                const info = await (await fetch(`${FLASK_API}/video_info`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                })).json();

                const resData = await (await fetch(`${FLASK_API}/available_resolutions`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                })).json();

                renderUI(info.title, info.author, resData.progressive, url, true);
            } catch(e) { alert("Flask Server Offline!"); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        async function fetchSocial(url) {
            try {
                const data = await (await fetch(RAPID_API, {
                    method: 'POST', headers: {'Content-Type': 'application/json', 'X-RapidAPI-Key': RAPID_KEY},
                    body: JSON.stringify({url: url})
                })).json();
                renderUI(data.title, data.source, data.medias.map(m=>m.quality), url, false, data.medias);
            } catch(e) { alert("API Error!"); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function renderUI(title, author, resolutions, url, isYT, medias=[]) {
            const resDiv = document.getElementById('results');
            resDiv.classList.remove('hidden');
            let btns = resolutions.map((r, i) => `
                <button onclick="${isYT ? `dlYT('${url}','${r}')` : `window.open('${medias[i].url}')`}" class="w-full glass border border-white/10 p-4 rounded-2xl flex justify-between items-center hover:bg-blue-600 transition-all group">
                    <span class="font-bold text-[10px] uppercase">${r} MP4</span>
                    <i class="fas fa-download opacity-30 group-hover:opacity-100"></i>
                </button>
            `).join('');
            
            resDiv.innerHTML = `
                <div class="glass p-8 rounded-[2.5rem] border-blue-500/20">
                    <h3 class="font-bold text-sm mb-2 italic">${title}</h3>
                    <p class="text-[9px] opacity-40 uppercase tracking-widest">${author}</p>
                </div>
                <div class="space-y-3">${btns}</div>
            `;
        }

        async function dlYT(url, res) {
            document.getElementById('loader').classList.remove('hidden');
            const response = await fetch(`${FLASK_API}/download/${res}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            const blob = await response.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `AyanX_${res}.mp4`;
            a.click();
            document.getElementById('loader').classList.add('hidden');
        }

        // PDF ENGINE
        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for(let i=0; i<e.target.files.length; i++) {
                const data = await new Promise(r => { 
                    const reader = new FileReader(); 
                    reader.onload=ev=>r(ev.target.result); 
                    reader.readAsDataURL(e.target.files[i]); 
                });
                if(i>0) doc.addPage();
                doc.addImage(data, 'JPEG', 10, 10, 190, 140);
            }
            doc.save("AyanX_PDF.pdf");
        });

        // V2LINK ENGINE
        document.getElementById('v2lInput').addEventListener('change', async (e) => {
            document.getElementById('v2lOutput').innerText = "CLONING TO CLOUD...";
            const fd = new FormData(); fd.append('file', e.target.files[0]);
            const r = await fetch('https://file.io', {method:'POST', body:fd});
            const d = await r.json();
            document.getElementById('v2lOutput').innerHTML = `URL: <input readonly value="${d.link}" class="bg-blue-600 p-2 rounded ml-2 text-[10px]">`;
        });
    </script>
</body>
</html>
