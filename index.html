<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYANX ULTIMATE | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-white/5 flex justify-between items-center">
        <div class="font-gaming text-2xl italic text-blue-500">AYANX</div>
        <div class="text-[10px] font-bold opacity-40 uppercase tracking-widest">v5.0 Ultimate</div>
    </nav>

    <main class="container mx-auto px-4 py-20 max-w-4xl text-center">
        <h1 class="font-gaming text-7xl font-black gradient-text mb-4 italic">BYPASS-X</h1>
        <p class="text-[10px] opacity-40 mb-12 tracking-[0.4em]">YOUTUBE & SOCIAL MEDIA DIRECT ENGINE</p>

        <div class="glass p-3 rounded-[3rem] flex flex-col md:flex-row gap-3 mb-10">
            <input type="url" id="linkBox" placeholder="Paste YouTube Link Here..." class="flex-1 bg-transparent px-8 py-5 outline-none font-bold text-lg">
            <button onclick="fetchInfo()" class="bg-blue-600 px-12 py-5 rounded-[2.5rem] font-gaming font-black hover:bg-white hover:text-black transition-all">FETCH</button>
        </div>

        <div id="loader" class="hidden mb-10">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-[10px] font-gaming animate-pulse">Syncing with Python Engine...</p>
        </div>

        <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
            <div id="videoMeta" class="glass p-6 rounded-[2.5rem]"></div>
            <div id="resOptions" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const API = "http://127.0.0.1:5000";

        async function fetchInfo() {
            const url = document.getElementById('linkBox').value;
            if(!url) return alert("Link kahan hai Boss?");
            
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const infoRes = await fetch(`${API}/video_info`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const info = await infoRes.json();

                const resRes = await fetch(`${API}/available_resolutions`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const resData = await resRes.json();

                showUI(info, resData.progressive, url);
            } catch(e) {
                alert("API Error! Terminal mein 'python main.py' chalao.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function showUI(info, resolutions, url) {
            const results = document.getElementById('results');
            const meta = document.getElementById('videoMeta');
            const opts = document.getElementById('resOptions');

            results.classList.remove('hidden');
            meta.innerHTML = `
                <img src="${info.thumbnail}" class="w-full rounded-2xl mb-4">
                <h3 class="font-bold text-sm">${info.title}</h3>
                <p class="text-[10px] opacity-40 mt-1 uppercase">${info.author}</p>
            `;

            opts.innerHTML = `<p class="text-[10px] font-gaming mb-4 opacity-50">Select Quality</p>` + 
                resolutions.map(r => `
                <button onclick="downloadVideo('${url}', '${r}')" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl flex justify-between items-center hover:bg-blue-600 transition-all">
                    <span class="font-bold text-xs">${r} MP4</span>
                    <i class="fas fa-download opacity-40"></i>
                </button>
            `).join('');
        }

        async function downloadVideo(url, res) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const response = await fetch(`${API}/download/${res}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const dlUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = dlUrl;
                    a.download = `AyanX_${res}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("Download Failed!");
                }
            } catch(e) {
                alert("Server Connection Lost!");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
