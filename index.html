<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYANX ULTIMATE | Pro Suite</title>
    
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');
        :root { --blue: #3b82f6; }
        body { font-family: 'Inter', sans-serif; transition: 0.5s; background: #000; color: #fff; overflow-x: hidden; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .v-link.active { color: var(--blue); border-bottom: 2px solid var(--blue); opacity: 1; }
        .v-link { opacity: 0.5; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; }
        .warning-tag { background: #ff4d4d; color: #000; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body id="mainBody">

    <nav class="p-4 sticky top-0 z-[100] border-b border-white/5 bg-black/80 backdrop-blur-md flex justify-between items-center">
        <div class="font-gaming text-2xl italic text-blue-500">AYANX</div>
        <div class="flex gap-6 items-center">
            <span onclick="switchView('downloader')" class="v-link active">Downloader</span>
            <span onclick="switchView('v2link')" class="v-link">V2Link</span>
            <span onclick="switchView('pdf')" class="v-link">PDF-Lab</span>
            <button onclick="toggleSettings()" class="text-blue-500"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="fixed inset-0 z-[200] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[2.5rem] max-w-sm w-full border border-blue-500/30 text-center">
            <h2 class="font-gaming text-blue-500 mb-6 italic">SYSTEM INTERFACE</h2>
            <div class="grid grid-cols-3 gap-2 mb-8">
                <button onclick="applyTheme('black')" class="bg-black border border-white/10 py-3 rounded-xl text-[8px] font-bold">BLACK</button>
                <button onclick="applyTheme('white')" class="bg-white text-black py-3 rounded-xl text-[8px] font-bold">WHITE</button>
                <button onclick="applyTheme('grey')" class="bg-gray-700 py-3 rounded-xl text-[8px] font-bold">GREY</button>
            </div>
            <button onclick="toggleSettings()" class="w-full bg-blue-600 py-4 rounded-xl font-gaming text-xs">SAVE SETTINGS</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3 glass px-4 py-2 rounded-full border-red-500/20">
                <span class="warning-tag">ONLINE</span>
                <p class="text-[9px] font-bold tracking-widest opacity-60 uppercase">Bypass Engine v6.0 Active</p>
            </div>
        </div>

        <section id="downloaderView" class="view">
            <div class="text-center mb-12">
                <h1 class="font-gaming text-7xl font-black gradient-text italic">ULTIMATE</h1>
                <p class="text-[9px] uppercase tracking-[0.5em] opacity-40 mt-2 font-bold">YouTube & 1000+ Sites Engine</p>
            </div>
            <div class="glass p-3 rounded-[3rem] flex flex-col md:flex-row gap-3 mb-12">
                <input type="url" id="mediaUrl" placeholder="PASTE VIDEO LINK HERE..." class="flex-1 bg-transparent px-8 py-5 outline-none font-bold text-lg">
                <button onclick="smartFetch()" class="bg-blue-600 px-12 py-5 rounded-[2.5rem] font-gaming font-black hover:bg-white hover:text-black transition-all">FETCH</button>
            </div>
            <div id="loader" class="hidden text-center mb-10">
                <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p class="font-gaming text-[8px] text-blue-500 mt-4 animate-pulse">Syncing Cloud...</p>
            </div>
            <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="v2linkView" class="view hidden text-center">
            <div class="glass p-16 rounded-[3rem] border-dashed border-white/10">
                <i class="fas fa-satellite-dish text-5xl text-blue-500 mb-6"></i>
                <h3 class="font-gaming text-sm mb-8">VIDEO TO CLOUD LINK</h3>
                <input type="file" id="v2lInput" class="hidden">
                <label for="v2lInput" class="bg-white text-black px-12 py-5 rounded-2xl font-bold text-[10px] cursor-pointer inline-block">UPLOAD FILE</label>
                <div id="v2lOutput" class="mt-10 font-bold text-blue-400"></div>
            </div>
        </section>

        <section id="pdfView" class="view hidden text-center">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-12 rounded-[3rem]">
                    <i class="fas fa-file-pdf text-4xl text-blue-500 mb-4"></i>
                    <h4 class="font-gaming text-[10px] mb-6">IMG TO PDF</h4>
                    <input type="file" id="pdfInput" multiple accept="image/*" class="hidden">
                    <label for="pdfInput" class="bg-blue-600 px-8 py-3 rounded-xl font-bold text-[9px] cursor-pointer uppercase">Select Images</label>
                </div>
                <div class="glass p-12 rounded-[3rem]">
                    <i class="fas fa-shield-alt text-4xl text-red-500 mb-4"></i>
                    <h4 class="font-gaming text-[10px] mb-6">PDF ENCRYPT</h4>
                    <input type="file" id="pdfSec" class="hidden">
                    <label for="pdfSec" class="bg-red-600 px-8 py-3 rounded-xl font-bold text-[9px] cursor-pointer uppercase">Select PDF</label>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API = "http://127.0.0.1:5000";

        // Navigation Logic
        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.v-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id + 'View').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        
        function applyTheme(t) {
            const b = document.getElementById('mainBody');
            if(t === 'white') { b.style.background = "#fff"; b.style.color = "#000"; }
            else if(t === 'grey') { b.style.background = "#1a1a1b"; b.style.color = "#fff"; }
            else { b.style.background = "#000"; b.style.color = "#fff"; }
        }

        // Fetching Logic
        async function smartFetch() {
            const url = document.getElementById('mediaUrl').value;
            if(!url) return alert("Link kahan hai Boss?");
            
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                if(url.includes('youtube.com') || url.includes('youtu.be')) {
                    const info = await (await fetch(`${API}/video_info`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url})
                    })).json();
                    const res = await (await fetch(`${API}/available_resolutions`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url})
                    })).json();
                    renderUI(info.title, info.author, res.progressive, url, true);
                } else {
                    const data = await (await fetch(`${API}/vkr_fetch`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url})
                    })).json();
                    const formats = data.formats.map(f => f.format_id || f.quality || 'MP4');
                    renderUI(data.title, data.source, formats, url, false, data.formats);
                }
            } catch(e) {
                alert("Engine Offline! Terminal mein server chalu karein.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderUI(title, author, resolutions, url, isYT, vkrData=[]) {
            const resDiv = document.getElementById('results');
            resDiv.classList.remove('hidden');
            let btns = resolutions.map((r, i) => `
                <button onclick="${isYT ? `dlYT('${url}','${r}')` : `window.open('${vkrData[i].url}')`}" class="w-full glass border border-white/10 p-4 rounded-2xl flex justify-between items-center hover:bg-blue-600 transition-all font-bold text-[10px]">
                    <span>${r} MP4</span><i class="fas fa-download opacity-30"></i>
                </button>
            `).join('');
            
            resDiv.innerHTML = `
                <div class="glass p-8 rounded-[2.5rem] border-blue-500/20">
                    <h3 class="font-bold text-sm mb-2 italic">${title}</h3>
                    <p class="text-[9px] opacity-40 uppercase tracking-widest">${author}</p>
                </div>
                <div class="space-y-3">${btns}</div>
            `;
        }

        async function dlYT(url, res) {
            document.getElementById('loader').classList.remove('hidden');
            const response = await fetch(`${API}/download/${res}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            const blob = await response.blob();
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `AyanX_${res}.mp4`;
            a.click();
            document.getElementById('loader').classList.add('hidden');
        }

        // PDF Logic
        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            for(let i=0; i<e.target.files.length; i++) {
                const data = await new Promise(r => { 
                    const reader = new FileReader(); 
                    reader.onload=ev=>r(ev.target.result); 
                    reader.readAsDataURL(e.target.files[i]); 
                });
                if(i>0) doc.addPage();
                doc.addImage(data, 'JPEG', 10, 10, 190, 140);
            }
            doc.save("AyanX_PDF.pdf");
        });
    </script>
</body>
</html>
