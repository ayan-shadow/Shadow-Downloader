<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center bg-white/10 backdrop-blur-lg rounded-3xl p-4 mb-6">
                <i class="fas fa-download text-3xl text-blue-400 mr-4"></i>
                <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
                    Video Downloader
                </h1>
            </div>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">
                Download videos from YouTube, TikTok, Instagram, Facebook & more in highest quality
            </p>
        </div>

        <!-- URL Input -->
        <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-8 mb-8 border border-white/10">
            <div class="flex flex-col md:flex-row gap-4">
                <input 
                    type="url" 
                    id="videoUrl" 
                    placeholder="Paste video URL here..." 
                    class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all duration-300 text-lg"
                >
                <button 
                    id="analyzeBtn" 
                    class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-4 px-8 rounded-2xl shadow-2xl hover:shadow-blue-500/25 transform hover:-translate-y-1 transition-all duration-300 whitespace-nowrap"
                >
                    <i class="fas fa-magic mr-2"></i>Analyze
                </button>
            </div>
            <div class="mt-4 text-sm text-gray-400 flex flex-wrap gap-4">
                <span>Supports:</span>
                <span class="bg-blue-500/20 px-3 py-1 rounded-full text-xs">YouTube</span>
                <span class="bg-pink-500/20 px-3 py-1 rounded-full text-xs">TikTok</span>
                <span class="bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent px-3 py-1 rounded-full text-xs">Instagram</span>
                <span class="bg-blue-500/20 px-3 py-1 rounded-full text-xs">Facebook</span>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            <p class="mt-4 text-xl text-gray-300">Analyzing video...</p>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <!-- Video Info -->
            <div class="bg-gradient-to-r from-green-500/10 to-blue-500/10 backdrop-blur-xl rounded-3xl p-8 mb-8 border border-green-500/20">
                <div class="flex flex-col md:flex-row gap-6 items-start md:items-center">
                    <img id="thumbnail" class="w-32 h-24 md:w-48 md:h-32 object-cover rounded-2xl shadow-2xl flex-shrink-0" alt="Thumbnail">
                    <div class="flex-1 min-w-0">
                        <h2 id="videoTitle" class="text-2xl md:text-3xl font-bold text-white mb-2 line-clamp-2"></h2>
                        <div class="flex flex-wrap gap-4 text-sm text-gray-300 mb-4">
                            <span id="platform" class="bg-white/10 px-4 py-2 rounded-full font-medium"></span>
                            <span id="duration" class="bg-white/10 px-4 py-2 rounded-full"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Download Buttons -->
            <div id="downloadList" class="space-y-4">
                <!-- Dynamic download buttons will be inserted here -->
            </div>
        </div>

        <!-- Error Message -->
        <div id="error" class="hidden bg-red-500/10 backdrop-blur-xl rounded-3xl p-8 border border-red-500/20 text-center">
            <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
            <h3 id="errorTitle" class="text-2xl font-bold text-white mb-2"></h3>
            <p id="errorMessage" class="text-gray-300"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
